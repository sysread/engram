[tools]
erlang = "latest"
elixir = "latest"
bats = "latest"

[tasks.check-deps]
description = "Verify system dependencies"
run = """
  ok=1
  for cmd in elixir bats parallel; do
    if ! command -v "$cmd" > /dev/null 2>&1; then
      echo "ERROR: '$cmd' is not installed. Install it with your package manager (e.g. brew install $cmd)." >&2
      ok=0
    fi
  done

  # EXLA needs a C++ compiler to build its NIF
  if ! command -v g++ > /dev/null 2>&1 && ! command -v c++ > /dev/null 2>&1; then
    echo "ERROR: No C++ compiler found (g++ or c++). Needed by EXLA to compile its NIF." >&2
    echo "  macOS: xcode-select --install" >&2
    echo "  Ubuntu/Debian: sudo apt-get install build-essential" >&2
    ok=0
  fi
  [ "$ok" -eq 1 ] || exit 1
"""

[tasks.test]
description = "Run bats tests"
depends = ["check-deps"]
run = "bats --jobs 4 test/"

[tasks.warm-cache]
description = "Download embedding model and elixir deps"
run = """
  export ENGRAM_DATA_DIR="$(mktemp -d)"
  ./engram search global -- "warmup" 2>/dev/null || true
  rm -rf "$ENGRAM_DATA_DIR"
"""
